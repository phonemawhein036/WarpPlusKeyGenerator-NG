name: Generate WARP+ Key
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Global Generator
        run: |
          curl -sL https://raw.githubusercontent.com/yebekhe/Telegram-Warp-Plus-Generator/main/warp.py -o warp.py
          python3 warp.py
