name: Generate WARP+ Key
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Generator
        run: |
          # အလုပ်လုပ်နေတဲ့ Script link အသစ်ကို ပြောင်းထားပါတယ်
          curl -sL https://raw.githubusercontent.com/TheRealGamer007/WARP-PLUS-KEY-GENERATOR/main/main.py -o warp.py
          python3 warp.py
